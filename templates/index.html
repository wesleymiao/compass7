<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compass7</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon-user.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-user-32.png">
  <link rel="apple-touch-icon" href="/static/img/favicon-user.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">Compass7</a>
      <div class="header-actions">
        <span id="user-info" class="text-secondary"></span>
        <button class="btn-icon" id="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="btn btn-sm btn-secondary" onclick="toggleLang()" id="lang-toggle">EN/中</button>
        <button class="btn btn-sm btn-secondary hidden" id="login-btn" onclick="showAuthModal()" data-i18n="login">登录</button>
        <button class="btn btn-sm btn-secondary hidden" id="logout-btn" onclick="userLogout()" data-i18n="logout">退出</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Steps -->
    <div class="steps" id="steps">
      <div class="step active" data-step="1" data-i18n="step1">选择学年</div>
      <div class="step" data-step="2" data-i18n="step2">选择班级</div>
      <div class="step" data-step="3" data-i18n="step3">选择课程</div>
      <div class="step" data-step="4" data-i18n="step4">预览导出</div>
    </div>

    <!-- Step 1: Year -->
    <div id="step-1" class="card">
      <h2 data-i18n="select_year">请选择学年</h2>
      <div id="year-list" class="mt-16"></div>
    </div>

    <!-- Step 2: Class -->
    <div id="step-2" class="card hidden">
      <h2 data-i18n="select_class">请选择班级</h2>
      <div id="class-list" class="mt-16"></div>
    </div>

    <!-- Step 3: Course Selection + Live Preview -->
    <div id="step-3" class="hidden">
      <div class="flex-between mb-16">
        <h2 data-i18n="select_courses">请为每个时间段选择课程</h2>
      </div>
      <div class="split-pane">
        <div class="split-left" id="elective-panel">
          <div id="elective-list"></div>
        </div>
        <div class="split-right" id="preview-panel">
          <h3 style="margin:0 0 8px 0" data-i18n="preview">课表预览</h3>
          <div class="schedule-wrapper">
            <table class="schedule-grid" id="user-schedule-table">
              <thead id="user-schedule-head"></thead>
              <tbody id="user-schedule-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Step 4: Export -->
    <div id="step-4" class="hidden">
      <div class="flex-between mb-16">
        <h2 data-i18n="export_title">导出课表</h2>
        <button class="btn btn-secondary" onclick="goToStep(3)">← 返回选课</button>
      </div>

      <div class="schedule-wrapper">
        <table class="schedule-grid" id="export-preview-table">
          <thead id="export-preview-head"></thead>
          <tbody id="export-preview-body"></tbody>
        </table>
      </div>

      <div class="export-options mt-24">
        <div class="export-option" onclick="showExportImage()">
          <div class="icon">📷</div>
          <div data-i18n="export_image">导出为图片</div>
        </div>
        <div class="export-option" onclick="doExportExcel()">
          <div class="icon">📊</div>
          <div data-i18n="export_excel">导出为 Excel</div>
        </div>
        <div class="export-option" onclick="showExportICS()">
          <div class="icon">📅</div>
          <div data-i18n="export_ics">导出为日历</div>
        </div>
      </div>

      <!-- Image export settings -->
      <div id="image-export-panel" class="card hidden mt-16">
        <h3>📷 导出图片设置</h3>
        <div style="display:flex;gap:12px;flex-wrap:wrap" class="mt-16">
          <div class="form-group" style="flex:1;min-width:120px">
            <label>宽度 (px)</label>
            <input type="number" id="export-width" min="400" max="8000" step="100">
          </div>
          <div class="form-group" style="flex:1;min-width:120px">
            <label>高度 (px)</label>
            <input type="number" id="export-height" min="300" max="8000" step="100" placeholder="自动">
          </div>
        </div>
        <p class="text-secondary" style="font-size:0.82rem;margin-bottom:12px" id="export-device-info"></p>
        <button class="btn btn-primary" onclick="doExportImage()">生成并下载图片</button>
      </div>

      <!-- ICS export settings -->
      <div id="ics-export-panel" class="card hidden mt-16">
        <h3 data-i18n="export_ics">导出为日历</h3>
        <div style="display:flex;gap:12px" class="mt-16">
          <div class="form-group" style="flex:1"><label data-i18n="semester_start">学期开始日期</label><input type="date" id="ics-start"></div>
          <div class="form-group" style="flex:1"><label data-i18n="semester_end">学期结束日期</label><input type="date" id="ics-end"></div>
        </div>
        <button class="btn btn-primary mt-8" onclick="doExportICS()" data-i18n="generate_ics">生成日历文件</button>
      </div>
    </div>
  </main>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchAuthTab('login')" id="tab-login" data-i18n="login">登录</div>
        <div class="auth-tab" onclick="switchAuthTab('register')" id="tab-register" data-i18n="register">注册</div>
      </div>
      <div id="auth-login-form">
        <div class="form-group"><label data-i18n="username">用户名</label><input type="text" id="login-username"></div>
        <div class="form-group"><label data-i18n="password">密码</label><input type="password" id="login-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()" data-i18n="login_btn">登录</button>
        <p class="text-center mt-8"><a href="#" onclick="closeAuthModal();return false" class="text-secondary" data-i18n="or_guest">或以游客身份继续</a></p>
      </div>
      <div id="auth-register-form" class="hidden">
        <div class="form-group"><label data-i18n="username">用户名</label><input type="text" id="reg-username"></div>
        <div class="form-group"><label data-i18n="email">邮箱（可选）</label><input type="email" id="reg-email"></div>
        <div class="form-group"><label data-i18n="password">密码</label><input type="password" id="reg-password" onkeydown="if(event.key==='Enter')doRegister()"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doRegister()" data-i18n="register_btn">注册</button>
      </div>
    </div>
  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/export.js"></script>
  <script>
    /* ── State ───────────────────────────────────── */
    let currentUser = null;  // null = guest
    let currentStep = 1;
    let selectedYear = null;
    let selectedClass = null;
    let classSchedule = {};
    let userSelections = {};

    const PERIODS = [
      { num: 1, time: "8:00-8:40" },
      { num: 2, time: "8:45-9:25" },
      { num: 3, time: "9:35-10:15" },
      { num: 4, time: "10:20-11:00" },
      { num: 5, time: "11:05-11:55" },
      { num: 6, time: "12:00-12:40", lunch: true },
      { num: 7, time: "12:45-13:25" },
      { num: 8, time: "13:30-14:10" },
      { num: 9, time: "14:15-14:55" },
      { num: 10, time: "15:00-15:40" },
      { num: 11, time: "15:45-16:25" }
    ];

    /* ── Init ────────────────────────────────────── */
    async function init() {
      // Check auth
      try {
        const res = await apiCall("/api/auth/me");
        if (res.user) {
          currentUser = res.user;
          document.getElementById("user-info").textContent = res.user.username;
          document.getElementById("logout-btn").classList.remove("hidden");
        } else {
          document.getElementById("login-btn").classList.remove("hidden");
        }
      } catch {
        document.getElementById("login-btn").classList.remove("hidden");
      }

      // Guest users start fresh every visit (no localStorage persistence)

      loadYears();
    }

    /* ── Steps ───────────────────────────────────── */
    function goToStep(step) {
      currentStep = step;
      for (let i = 1; i <= 4; i++) {
        document.getElementById(`step-${i}`).classList.toggle("hidden", i !== step);
        const stepEl = document.querySelector(`.step[data-step="${i}"]`);
        stepEl.classList.remove("active", "completed");
        if (i < step) stepEl.classList.add("completed");
        if (i === step) stepEl.classList.add("active");
      }
    }

    /* ── Auth ────────────────────────────────────── */
    function showAuthModal() { document.getElementById("auth-modal").classList.add("active"); }
    function closeAuthModal() { document.getElementById("auth-modal").classList.remove("active"); }

    function switchAuthTab(tab) {
      document.getElementById("tab-login").classList.toggle("active", tab === "login");
      document.getElementById("tab-register").classList.toggle("active", tab === "register");
      document.getElementById("auth-login-form").classList.toggle("hidden", tab !== "login");
      document.getElementById("auth-register-form").classList.toggle("hidden", tab !== "register");
    }

    async function doLogin() {
      try {
        const res = await apiCall("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("login-username").value,
            password: document.getElementById("login-password").value
          })
        });
        currentUser = res.user;
        document.getElementById("user-info").textContent = res.user.username;
        document.getElementById("login-btn").classList.add("hidden");
        document.getElementById("logout-btn").classList.remove("hidden");
        closeAuthModal();
        showToast(t("success_save"));
        // Load server selections
        loadServerSelections();
      } catch (e) { showToast(e.message, "error"); }
    }

    async function doRegister() {
      try {
        const res = await apiCall("/api/auth/register", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("reg-username").value,
            email: document.getElementById("reg-email").value,
            password: document.getElementById("reg-password").value
          })
        });
        currentUser = res.user;
        document.getElementById("user-info").textContent = res.user.username;
        document.getElementById("login-btn").classList.add("hidden");
        document.getElementById("logout-btn").classList.remove("hidden");
        closeAuthModal();
        showToast(t("success_register"));
        // Migrate guest selections to server
        if (Object.keys(userSelections).length > 0 && selectedYear && selectedClass) {
          saveSelectionsToServer();
        }
      } catch (e) { showToast(e.message, "error"); }
    }

    function userLogout() {
      apiCall("/api/auth/logout", { method: "POST" });
      currentUser = null;
      document.getElementById("user-info").textContent = "";
      document.getElementById("logout-btn").classList.add("hidden");
      document.getElementById("login-btn").classList.remove("hidden");
      location.reload();
    }

    async function loadServerSelections() {
      if (!currentUser) return;
      try {
        const data = await apiCall("/api/selections");
        if (data.year_id && data.class_id) {
          userSelections = data.selections || {};
          // Reload schedule if on step 3
          if (currentStep === 3) renderUserSchedule();
        }
      } catch {}
    }

    /* ── Years ───────────────────────────────────── */
    async function loadYears() {
      const data = await apiCall("/api/years");
      const list = document.getElementById("year-list");
      list.innerHTML = "";
      if (data.years.length === 0) {
        list.innerHTML = `<p class="text-secondary" data-i18n="no_data">${t("no_data")}</p>`;
        return;
      }
      data.years.forEach(y => {
        const btn = document.createElement("button");
        btn.className = "btn btn-secondary";
        btn.style.margin = "4px";
        btn.textContent = y.name;
        btn.onclick = () => { selectedYear = y; goToStep(2); loadClasses(); };
        list.appendChild(btn);
      });
    }

    /* ── Classes ─────────────────────────────────── */
    async function loadClasses() {
      const data = await apiCall(`/api/years/${selectedYear.id}/classes`);
      const list = document.getElementById("class-list");
      list.innerHTML = "";
      if (data.classes.length === 0) {
        list.innerHTML = `<p class="text-secondary" data-i18n="no_data">${t("no_data")}</p>`;
        return;
      }
      data.classes.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "btn btn-secondary";
        btn.style.margin = "4px";
        btn.textContent = c.name;
        btn.onclick = () => { selectedClass = c; goToStep(3); loadUserSchedule(); };
        list.appendChild(btn);
      });
    }

    /* ── User Schedule ───────────────────────────── */
    let electiveGroups = []; // [{ sig, courses, slotKeys }]

    async function loadUserSchedule() {
      const data = await apiCall(`/api/classes/${selectedYear.id}/${selectedClass.id}/schedule`);
      classSchedule = data.schedule || {};
      buildElectiveList();
    }

    function buildElectiveList() {
      // Find all multi-course slots, group by signature (same course set = one choice)
      const sigMap = {};
      for (let d = 1; d <= 5; d++) {
        PERIODS.forEach(p => {
          const slot = classSchedule[String(d)] && classSchedule[String(d)][String(p.num)];
          if (!slot || !slot.courses || slot.courses.length <= 1) return;
          const sig = slot.courses.map(c => c.name_cn).sort().join(",");
          if (!sigMap[sig]) sigMap[sig] = { sig, courses: slot.courses, slotKeys: [] };
          sigMap[sig].slotKeys.push(`${d}_${p.num}`);
        });
      }
      electiveGroups = Object.values(sigMap);

      // Auto-select single-course slots
      for (let d = 1; d <= 5; d++) {
        PERIODS.forEach(p => {
          const slot = classSchedule[String(d)] && classSchedule[String(d)][String(p.num)];
          if (slot && slot.courses && slot.courses.length === 1) {
            userSelections[`${d}_${p.num}`] = slot.courses[0].id;
          }
        });
      }

      renderElectiveList();
      renderUserSchedule();
    }

    function renderElectiveList() {
      const container = document.getElementById("elective-list");
      if (!electiveGroups.length) {
        container.innerHTML = `<p class="text-secondary">没有选修课需要选择</p><button class="btn btn-primary mt-16" onclick="goToStep(4);renderExportPreview();" style="width:100%">导出课表 →</button>`;
        return;
      }

      const dayNames = ["", t("monday"), t("tuesday"), t("wednesday"), t("thursday"), t("friday")];
      container.innerHTML = electiveGroups.map((g, i) => {
        // Show where this group appears
        const locations = g.slotKeys.map(k => {
          const [d, p] = k.split("_").map(Number);
          const period = PERIODS.find(pp => pp.num === p);
          return `${dayNames[d]} ${period.label || t("period") + p}`;
        }).join("、");

        const options = g.courses.map(c => {
          const name = currentLang === "zh" ? c.name_cn : c.name_en;
          const meta = [c.teacher, c.room].filter(Boolean).join(" · ");
          const label = meta ? `${name}（${meta}）` : name;
          const checked = userSelections[g.slotKeys[0]] === c.name_cn ? "checked" : "";
          return `<label style="display:block;padding:6px 12px;cursor:pointer;border-bottom:1px solid var(--border)"><input type="radio" name="elective-${i}" value="${c.name_cn}" ${checked} onchange="selectElective(${i},this.value)" style="margin-right:8px">${label}</label>`;
        }).join("");

        // Only show skip option for groups with >2 courses (mandatory either/or choices don't get skip)
        const showSkip = g.courses.length > 2;
        const skipChecked = userSelections[g.slotKeys[0]] === "__skip__" ? "checked" : "";

        return `<div class="card mb-16" style="padding:16px">
          <div style="font-weight:600;margin-bottom:4px">选修组 ${i + 1}</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px">出现在：${locations}</div>
          <div style="border:1px solid var(--border);border-radius:4px;overflow:hidden">
            ${options}
            ${showSkip ? `<label style="display:block;padding:6px 12px;cursor:pointer;color:var(--text-secondary)"><input type="radio" name="elective-${i}" value="__skip__" ${skipChecked} onchange="selectElective(${i},'__skip__')" style="margin-right:8px">不参加</label>` : ""}
          </div>
        </div>`;
      }).join("") + `<button class="btn btn-primary mt-16" id="to-export-btn" disabled onclick="goToStep(4);renderExportPreview();" style="width:100%">导出课表 →</button>`;

      checkElectivesComplete();
    }

    window.selectElective = function(groupIdx, courseId) {
      const g = electiveGroups[groupIdx];
      g.slotKeys.forEach(key => {
        if (courseId === "__skip__") userSelections[key] = "__skip__";
        else userSelections[key] = courseId;
      });
      saveSelections();
      checkElectivesComplete();
      renderUserSchedule();
    };

    function checkElectivesComplete() {
      const allDone = electiveGroups.every(g => {
        const val = userSelections[g.slotKeys[0]];
        return val && val !== "";
      });
      const btn = document.getElementById("to-export-btn");
      if (btn) btn.disabled = !allDone;
    }

    function renderUserSchedule() {
      renderScheduleInto("user-schedule-head", "user-schedule-body");
    }

    function renderScheduleInto(headId, bodyId) {
      const days = [t("monday"), t("tuesday"), t("wednesday"), t("thursday"), t("friday")];
      const head = document.getElementById(headId);
      const body = document.getElementById(bodyId);
      if (!head || !body) return;

      head.innerHTML = `<tr><th>${t("period")}</th><th>${t("time")}</th>${days.map(d => `<th>${d}</th>`).join("")}</tr>`;
      body.innerHTML = "";

      PERIODS.forEach(p => {
        const tr = document.createElement("tr");
        if (p.lunch) tr.classList.add("lunch-row");

        const labelTd = document.createElement("td");
        labelTd.className = "period-label";
        const blockLabel = getBlockLabel(p.num);
        labelTd.textContent = blockLabel || (p.lunch ? t("lunch") : (p.label || `${t("period")} ${p.num}`));
        tr.appendChild(labelTd);

        const timeTd = document.createElement("td");
        timeTd.className = "period-label";
        timeTd.innerHTML = `<span class="period-time">${p.time}</span>`;
        tr.appendChild(timeTd);

        for (let d = 1; d <= 5; d++) {
          const td = document.createElement("td");
          td.className = "slot-cell";
          if (p.lunch) {
            // Check if lunch slot has courses
            const slot = classSchedule[String(d)] && classSchedule[String(d)][String(p.num)];
            if (slot && slot.courses && slot.courses.length > 0) {
              const selId = userSelections[`${d}_${p.num}`];
              if (selId && selId !== "__skip__") {
                const course = slot.courses.find(c => c.name_cn === selId || c.id === selId);
                if (course) {
                  const tag = document.createElement("span");
                  tag.className = "course-tag selected";
                  tag.textContent = currentLang === "zh" ? course.name_cn : course.name_en;
                  const meta = [course.teacher, course.room].filter(Boolean).join(" · ");
                  if (meta) tag.title = meta;
                  td.appendChild(tag);
                }
              } else if (slot.courses.length === 1) {
                const c = slot.courses[0];
                const tag = document.createElement("span");
                tag.className = "course-tag selected";
                tag.textContent = currentLang === "zh" ? c.name_cn : c.name_en;
                td.appendChild(tag);
              } else {
                td.textContent = t("lunch");
              }
            } else {
              td.textContent = t("lunch");
            }
          } else {
            const slot = classSchedule[String(d)] && classSchedule[String(d)][String(p.num)];
            const selId = userSelections[`${d}_${p.num}`];
            if (slot && slot.courses && selId && selId !== "__skip__") {
              const course = slot.courses.find(c => c.name_cn === selId || c.id === selId);
              if (course) {
                const tag = document.createElement("span");
                tag.className = "course-tag selected";
                const label = currentLang === "zh" ? course.name_cn : course.name_en;
                const meta = [course.teacher, course.room].filter(Boolean).join(" · ");
                tag.textContent = label;
                if (meta) tag.title = meta;
                td.appendChild(tag);
              }
            } else if (slot && slot.courses && slot.courses.length === 1) {
              const c = slot.courses[0];
              const tag = document.createElement("span");
              tag.className = "course-tag selected";
              tag.textContent = currentLang === "zh" ? c.name_cn : c.name_en;
              const meta = [c.teacher, c.room].filter(Boolean).join(" · ");
              if (meta) tag.title = meta;
              td.appendChild(tag);
            }
          }
          tr.appendChild(td);
        }
        body.appendChild(tr);
      });
    }

    function getBlockLabel(period) {
      for (let d = 1; d <= 5; d++) {
        const slot = classSchedule[String(d)] && classSchedule[String(d)][String(period)];
        if (slot && slot.block_label) return slot.block_label;
      }
      return null;
    }

    function saveSelections() {
      if (currentUser) {
        saveSelectionsToServer();
      }
      // Guest selections are not persisted
    }

    async function saveSelectionsToServer() {
      if (!currentUser) return;
      try {
        await apiCall("/api/selections", {
          method: "POST",
          body: JSON.stringify({
            year_id: selectedYear.id,
            class_id: selectedClass.id,
            selections: userSelections
          })
        });
      } catch {}
    }

    /* ── Export ───────────────────────────────────── */

    function renderExportPreview() {
      const days = [t("monday"), t("tuesday"), t("wednesday"), t("thursday"), t("friday")];
      const head = document.getElementById("export-preview-head");
      const body = document.getElementById("export-preview-body");

      head.innerHTML = `<tr><th>${t("period")}</th><th>${t("time")}</th>${days.map(d => `<th>${d}</th>`).join("")}</tr>`;
      body.innerHTML = "";

      PERIODS.forEach(p => {
        const tr = document.createElement("tr");
        if (p.lunch) tr.classList.add("lunch-row");

        const labelTd = document.createElement("td");
        labelTd.className = "period-label";
        const bl = getBlockLabel(p.num);
        labelTd.textContent = bl || (p.lunch ? t("lunch") : (p.label || `${t("period")} ${p.num}`));
        tr.appendChild(labelTd);

        const timeTd = document.createElement("td");
        timeTd.className = "period-label";
        timeTd.innerHTML = `<span class="period-time">${p.time}</span>`;
        tr.appendChild(timeTd);

        for (let d = 1; d <= 5; d++) {
          const td = document.createElement("td");
          if (p.lunch) {
            const slot = classSchedule[String(d)] && classSchedule[String(d)][String(p.num)];
            const courseId = userSelections[`${d}_${p.num}`];
            if (slot && courseId && courseId !== "__skip__") {
              const course = slot.courses.find(c => c.name_cn === courseId || c.id === courseId);
              if (course) td.textContent = currentLang === "zh" ? course.name_cn : course.name_en;
              else td.textContent = t("lunch");
            } else if (slot && slot.courses && slot.courses.length === 1) {
              td.textContent = currentLang === "zh" ? slot.courses[0].name_cn : slot.courses[0].name_en;
            } else {
              td.textContent = t("lunch");
            }
          }
          else {
            const slot = classSchedule[String(d)] && classSchedule[String(d)][String(p.num)];
            const courseId = userSelections[`${d}_${p.num}`];
            if (slot && courseId && courseId !== "__skip__") {
              const course = slot.courses.find(c => c.name_cn === courseId || c.id === courseId);
              if (course) {
                td.textContent = currentLang === "zh" ? course.name_cn : course.name_en;
              }
            }
          }
          tr.appendChild(td);
        }
        body.appendChild(tr);
      });
    }

    function showExportImage() {
      document.getElementById("ics-export-panel").classList.add("hidden");
      const panel = document.getElementById("image-export-panel");
      panel.classList.toggle("hidden");
      if (!panel.classList.contains("hidden")) {
        const dpr = window.devicePixelRatio || 1;
        const w = Math.round(screen.width * dpr);
        const h = Math.round(screen.height * dpr);
        document.getElementById("export-width").value = w;
        document.getElementById("export-height").value = "";
        document.getElementById("export-height").placeholder = "自动";
        document.getElementById("export-device-info").textContent =
          `设备分辨率: ${screen.width}×${screen.height} @ ${dpr}x = ${w}×${h}px`;
      }
    }

    function doExportImage() {
      const table = document.getElementById("export-preview-table");
      const w = parseInt(document.getElementById("export-width").value) || 1920;
      const h = document.getElementById("export-height").value ? parseInt(document.getElementById("export-height").value) : null;
      const username = currentUser ? currentUser.username : null;
      exportAsImage(table, { width: w, height: h, username: username });
    }

    function doExportExcel() {
      exportAsExcel(classSchedule, userSelections, selectedClass ? selectedClass.name : "timetable");
    }

    function showExportICS() {
      const panel = document.getElementById("ics-export-panel");
      panel.classList.toggle("hidden");
      document.getElementById("image-export-panel").classList.add("hidden");
    }

    function doExportICS() {
      const start = document.getElementById("ics-start").value;
      const end = document.getElementById("ics-end").value;
      if (!start || !end) return showToast(t("error_required"), "error");
      exportAsICS(classSchedule, userSelections, start, end);
    }

    /* ── Language change listener ─────────────────── */
    window.addEventListener("langchange", () => {
      if (currentStep === 1) loadYears();
      if (currentStep === 2) loadClasses();
      if (currentStep === 3) { renderElectiveList(); renderUserSchedule(); }
      if (currentStep === 4) { renderExportPreview(); }
    });

    /* ── Start ───────────────────────────────────── */
    init();
  </script>
</body>
</html>

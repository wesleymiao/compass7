<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- "7" in blue -->
  <text x="28" y="50" text-anchor="middle" font-family="Arial Black,Impact,Helvetica" font-size="44" font-weight="900" fill="#0071e3" filter="url(#shadow)">7</text>
  <!-- Gear icon top-right - proper gear shape -->
  <g transform="translate(50,14)" fill="#ff9500">
    <!-- Gear body -->
    <circle cx="0" cy="0" r="7" fill="#ff9500"/>
    <circle cx="0" cy="0" r="3.5" fill="#1a1a2e"/>
    <!-- Gear teeth (8 teeth) -->
    <rect x="-1.8" y="-11" width="3.6" height="4.5" rx="1" fill="#ff9500"/>
    <rect x="-1.8" y="6.5" width="3.6" height="4.5" rx="1" fill="#ff9500"/>
    <rect x="-11" y="-1.8" width="4.5" height="3.6" rx="1" fill="#ff9500"/>
    <rect x="6.5" y="-1.8" width="4.5" height="3.6" rx="1" fill="#ff9500"/>
    <rect x="-1.8" y="-11" width="3.6" height="4.5" rx="1" fill="#ff9500" transform="rotate(45)"/>
    <rect x="-1.8" y="6.5" width="3.6" height="4.5" rx="1" fill="#ff9500" transform="rotate(45)"/>
    <rect x="-11" y="-1.8" width="4.5" height="3.6" rx="1" fill="#ff9500" transform="rotate(45)"/>
    <rect x="6.5" y="-1.8" width="4.5" height="3.6" rx="1" fill="#ff9500" transform="rotate(45)"/>
  </g>
</svg>
